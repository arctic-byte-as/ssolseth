<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Tracker</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: Arial, sans-serif; background-color: #1a1a2e; color: #eee; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
      .container { background-color: #16213e; border-radius: 16px; padding: 32px; width: 100%; max-width: 620px; box-shadow: 0 10px 35px rgba(0,0,0,0.35); }
      h1 { font-size: 1.6rem; margin-bottom: 0.75rem; color: #e94560; text-align: center; letter-spacing: 1px; text-transform: uppercase; }
      #timer { font-size: 3rem; font-weight: bold; text-align: center; color: #ffffff; margin-bottom: 1rem; }
      .form-group { margin-bottom: 0.75rem; }
      input[type="text"], input.edit-input { width: 100%; padding: 12px 14px; border-radius: 10px; border: 2px solid #0f3460; background-color: #0f3460; color: #eee; font-size: 1rem; outline: none; }
      .buttons { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin-bottom: 1rem; }
      button { padding: 10px 14px; border: none; border-radius: 10px; background-color: #0f3460; color: #eee; cursor: pointer; font-size: 0.95rem; }
      button.delete-btn { background-color: #e94560; }
      .session-item { display: flex; align-items: stretch; gap: 0.75rem; margin-bottom: 0.5rem; }
      .session-left { flex: 1; padding: 12px; border-radius: 12px; background: linear-gradient(180deg,#0f3460,#09203a); color: #e6eef8; display:flex; flex-direction:column; justify-content:center; }
      .session-right { width: 150px; padding: 12px; border-radius: 12px; background: linear-gradient(180deg,#e94560,#c63a52); color: #fff; display:flex; flex-direction:column; align-items:center; justify-content:center; }
      .session-duration { font-weight:700; font-size:1rem; }
      .session-meta { font-size:0.85rem; color: #d6d9f0; margin-top:6px; }
      .session-actions { display:flex; gap:8px; margin-top:8px; }
      .session-actions button{ padding:6px 8px; border-radius:8px; font-size:0.8rem; }
      .empty-state { color: #a1a1c9; font-size: 0.95rem; text-align: center; margin-top: 0.5rem; }
      .ads { margin-top: 1.25rem; display: grid; gap: 0.75rem; }
      .ad-item { display: flex; flex-direction: column; gap: 0.4rem; padding: 10px; border-radius: 10px; background: linear-gradient(180deg, #0f3460, #09203a); border: 1px solid rgba(255,255,255,0.04); }
      .ad-title { font-weight: 700; color: #ffd97a; }
      .ad-desc { color: #dfe6ff; }
      .ad-cta { margin-top: 0.4rem; padding: 6px 8px; border-radius: 8px; background-color: #e94560; color: white; text-decoration: none; display: inline-block; }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Time Tracker</h1>
      <p id="timer">00:00:00</p>

      <div class="form-group">
        <input type="text" id="sessionName" placeholder="What are you working on?" autocomplete="off">
      </div>

      <div class="buttons">
        <button id="startStop" type="button">Start</button>
        <button id="clearAll" type="button">Clear All</button>
      </div>

      <h2>Session Log</h2>
      <ul id="log"></ul>
      <p id="emptyState" class="empty-state">No sessions yet. Start the timer to log your work.</p>

      <!-- Ads (simulated) -->
      <div class="ads" id="ads" aria-live="polite"></div>

      <script>
        document.addEventListener('DOMContentLoaded', () => {
          let timerId = null; let seconds = 0; let running = false;
          const timerLabel = document.getElementById('timer');
          const startStopButton = document.getElementById('startStop');
          const clearAllButton = document.getElementById('clearAll');
          const sessionNameInput = document.getElementById('sessionName');
          const logList = document.getElementById('log');
          const emptyState = document.getElementById('emptyState');
          const adsContainer = document.getElementById('ads');

          const adsDB = [
            { id:1, keywords:['design','ux','ui'], title:'Flexible UX Courses', desc:'Learn practical UX—short courses for teams.', url:'https://example.com/ux-courses' },
            { id:2, keywords:['meeting','call','standup'], title:'Smart Meeting Tools', desc:'Run focused meetings with agendas and timers.', url:'https://example.com/meeting-tools' },
            { id:3, keywords:['coding','dev','development','engineer'], title:'Cloud IDE — 50% off', desc:'Code from anywhere with instant dev environments.', url:'https://example.com/cloud-ide' },
            { id:4, keywords:['writing','blog','docs'], title:'AI Writer Pro', desc:'Write docs faster with guided templates.', url:'https://example.com/ai-writer' },
            { id:5, keywords:['coffee','break','focus'], title:'Focus Coffee Subscription', desc:'Curated blends to keep you focused during sessions.', url:'https://example.com/coffee' }
          ];

          const blacklist = ['sex','porn','illegal','drugs','weapon','crime'];

          function formatTime(totalSeconds){ const h=Math.floor(totalSeconds/3600); const m=Math.floor((totalSeconds%3600)/60); const s=totalSeconds%60; return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0'); }

          function getSessions(){ try{ return JSON.parse(localStorage.getItem('sessions')||'[]'); }catch(e){ return []; } }
          function saveSessions(s){ localStorage.setItem('sessions', JSON.stringify(s)); }
          function refreshEmptyState(){ emptyState.style.display = logList.children.length ? 'none' : 'block'; }

          function renderSessions(){ logList.innerHTML=''; getSessions().forEach((s,i)=>displaySession(s,i)); refreshEmptyState(); updateAdsFromSessions(); }

          function displaySession(session,index){
            const li = document.createElement('li');
            li.className = 'session-item';

            const left = document.createElement('div');
            left.className = 'session-left';
            const title = document.createElement('div');
            title.textContent = session.label || 'Unnamed session';
            const meta = document.createElement('div');
            meta.className = 'session-meta';
            meta.textContent = 'Stopped at ' + session.time;
            left.appendChild(title);
            left.appendChild(meta);

            const right = document.createElement('div');
            right.className = 'session-right';
            const dur = document.createElement('div');
            dur.className = 'session-duration';
            dur.textContent = session.duration;

            const actions = document.createElement('div');
            actions.className = 'session-actions';
            const editBtn = document.createElement('button');
            editBtn.type = 'button'; editBtn.textContent = 'Edit';
            editBtn.addEventListener('click', ()=>{
              const input = document.createElement('input'); input.type='text'; input.value = session.label; input.className='edit-input';
              const save = document.createElement('button'); save.type='button'; save.textContent='Save';
              const cancel = document.createElement('button'); cancel.type='button'; cancel.textContent='Cancel';
              left.innerHTML = '';
              left.append(input);
              actions.innerHTML = '';
              actions.append(save, cancel);
              save.addEventListener('click', ()=>{ updateSessionName(index, input.value); });
              cancel.addEventListener('click', ()=>{ renderSessions(); });
            });

            const deleteBtn = document.createElement('button');
            deleteBtn.type='button'; deleteBtn.textContent='Delete'; deleteBtn.className='delete-btn';
            deleteBtn.addEventListener('click', ()=>{ deleteSession(index); });

            actions.append(editBtn, deleteBtn);
            right.appendChild(dur);
            right.appendChild(actions);

            li.appendChild(left);
            li.appendChild(right);
            logList.appendChild(li);
          }

          function deleteSession(index){ const s=getSessions(); if(index<0||index>=s.length) return; s.splice(index,1); saveSessions(s); renderSessions(); }
          function updateSessionName(index,newName){ const s=getSessions(); if(index<0||index>=s.length) return; s[index].label = (newName||'').trim() || 'Unnamed session'; saveSessions(s); renderSessions(); }
          function clearAllSessions(){ const s=getSessions(); if(!s.length) return; if(window.confirm('Clear all sessions? This will remove every logged session and cannot be undone.')){ saveSessions([]); renderSessions(); } }

          function matchesBlacklist(text){ const t=(text||'').toLowerCase(); return blacklist.some(b=>t.includes(b)); }
          function findAdsForQuery(query,max=3){ if(!query || matchesBlacklist(query)) return []; const q=query.toLowerCase(); const matches=[]; adsDB.forEach(ad=>{ for(const k of ad.keywords){ if(q.includes(k) || k.includes(q)){ matches.push(ad); break; } } }); return matches.slice(0,max); }

          function updateAds(query){ adsContainer.innerHTML=''; const ads=findAdsForQuery(query); if(!ads.length) return; ads.forEach(ad=>{ const item=document.createElement('div'); item.className='ad-item'; const title=document.createElement('div'); title.className='ad-title'; title.textContent=ad.title; const desc=document.createElement('div'); desc.className='ad-desc'; desc.textContent=ad.desc; const cta=document.createElement('a'); cta.className='ad-cta'; cta.textContent='View'; cta.href=ad.url; cta.target='_blank'; cta.rel='noopener'; item.append(title, desc, cta); adsContainer.appendChild(item); }); }

          function updateAdsFromSessions(){ const sessions = getSessions(); const combined = sessions.map(s=>s.label).join(' '); updateAds(combined); }

          function tick(){ seconds++; timerLabel.textContent = formatTime(seconds); }
          startStopButton.addEventListener('click', ()=>{
            if(!running){ running=true; startStopButton.textContent='Stop'; timerId = setInterval(tick,1000); } else { running=false; startStopButton.textContent='Start'; clearInterval(timerId); const label = (sessionNameInput.value||'').trim() || 'Unnamed session'; const time = new Date().toLocaleString(); const duration = formatTime(seconds); const sessions = getSessions(); sessions.unshift({ label, time, duration }); saveSessions(sessions); seconds = 0; timerLabel.textContent = formatTime(0); sessionNameInput.value=''; renderSessions(); }
          });

          clearAllButton.addEventListener('click', clearAllSessions);

          renderSessions();
        });
      </script>
    </div>
  </body>
</html>
